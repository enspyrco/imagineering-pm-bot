services:
  bot:
    build:
      context: .
      args:
        - BUILD_VERSION=${VERSION:-dev}
        - BUILD_SHA=${GIT_COMMIT:-local}
        - BUILD_TIME=${BUILD_TIME:-unknown}
    env_file:
      - .env
    volumes:
      - bot-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:8081/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  bot-data:
